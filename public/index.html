<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVision</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo-text">GeoVision</h1>
                <p class="subtitle">Earth Engine Temporal Comparison</p>
            </div>

            <form id="control-form" class="controls-container">
                <div class="form-group">
                    <label for="location">Location</label>
                    <div class="input-container">
                        <input type="text" id="location" name="location" placeholder="e.g. Pune, India" value="Pune, India">
                    </div>
                </div>

                <div class="form-group">
                    <label for="before_date">Before Date</label>
                    <div class="input-container">
                        <input type="text" id="before_date" name="before_date" placeholder="Select Before Date" value="2019-01-01">
                    </div>
                </div>

                <div class="form-group">
                    <label for="after_date">After Date</label>
                    <div class="input-container">
                        <input type="text" id="after_date" name="after_date" placeholder="Select After Date" value="2024-01-01">
                    </div>
                </div>

                <section class="comparison-panel" aria-labelledby="comparison-heading">
                    <div class="comparison-panel__header">
                        <div>
                            <p class="comparison-panel__eyebrow">Compare imagery</p>
                            <h2 id="comparison-heading">Drag the divider on the map</h2>
                        </div>
                        <span class="comparison-panel__hint">The split line now lives on the map itself.</span>
                    </div>

                    <label class="toggle-row" for="change-mask-toggle">
                        <input type="checkbox" id="change-mask-toggle" checked>
                        <span>
                            <strong>Show change mask</strong>
                            <small>Highlights transitions such as forest to urban, water to urban, and more.</small>
                        </span>
                    </label>
                </section>

                <button type="submit" class="btn-primary" id="generate-btn">
                    <span class="btn-text">Generate Map</span>
                    <span class="loader"></span>
                </button>
            </form>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container">
            <div class="map-overlay" id="map-overlay">
                <div class="overlay-card">
                    <div class="spinner"></div>
                    <h2>Processing Data</h2>
                    <p>Fetching Sentinel-2 imagery and computing composites from Earth Engine.</p>
                </div>
            </div>
            <!-- Ensure it points to an existing map by default if the backend is slow to load initially -->
            <iframe id="map-frame" src="maps/default_map.html" title="Map Viewer"></iframe>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
</body>
</html>
