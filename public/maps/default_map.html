<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVision Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
        #map, #map-container { width: 100%; height: 100%; }
        .instruction-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1100;
            background: rgba(255,255,255,0.95);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .instruction-box h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .instruction-box p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            max-width: 320px;
        }
        .instruction-box .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .instruction-box strong {
            color: #0071e3;
        }
        /* Side by side layout */
        #map-container {
            display: flex;
        }
        #map-container .map-panel {
            flex: 1;
            height: 100vh;
            position: relative;
        }
        #map-container .map-panel .map-label {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: rgba(26, 26, 46, 0.9);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            white-space: nowrap;
        }
        #map-container .map-panel .controls {
            position: absolute;
            top: 55px;
            left: 10px;
            background: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        #map-container .divider {
            width: 4px;
            height: 100vh;
            background: #0071e3;
            flex-shrink: 0;
        }
        #map-container .leaflet-container {
            width: 100%;
            height: 100%;
        }
        .stats-panel {
            position: absolute;
            bottom: 12px;
            left: 10px;
            background: rgba(26, 26, 46, 0.92);
            color: white;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            max-width: 260px;
            display: none;
        }
        .stats-panel:not(:empty) { display: block; }
        .stats-header {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #90caf9;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .stats-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
        }
        .stats-swatch {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .stats-name {
            flex: 1;
            font-weight: 500;
        }
        .stats-pct {
            width: 38px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.7);
        }
        .stats-arrow {
            color: rgba(255,255,255,0.4);
        }
        .stats-delta {
            width: 60px;
            text-align: right;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        /* Settlement markers */
        .settlement-dot {
            radius: 4;
        }
        .settlement-label {
            background: rgba(26, 26, 46, 0.85) !important;
            border: none !important;
            border-radius: 4px !important;
            color: white !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            padding: 2px 6px !important;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3) !important;
            white-space: nowrap !important;
        }
        .settlement-label::before {
            border-top-color: rgba(26, 26, 46, 0.85) !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="instruction-box" id="instruction-box">
        <div class="icon">🛰️</div>
        <h2>GeoVision</h2>
        <p>Select a location and date range in the sidebar, then click <strong>Generate Map</strong> to compare satellite imagery over time.</p>
    </div>

    <script>
        var map = L.map('map', {
            center: [18.52, 73.85],
            zoom: 11,
            zoomControl: true,
            attributionControl: false
        });

        L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { maxZoom: 18 }
        ).addTo(map);

        function hideInstruction() {
            var box = document.getElementById('instruction-box');
            if (box) box.style.display = 'none';
        }

        function showMap(config) {
            if (!config) return;

            hideInstruction();

            // Remove current map
            map.remove();
            document.getElementById('map').style.display = 'none';

            var tile1url = config.before_tiles;
            var tile2url = config.after_tiles;
            console.log('Layer 1 (before) URL:', tile1url);
            console.log('Layer 2 (after)  URL:', tile2url);
            if (tile1url === tile2url) {
                console.warn('WARNING: Both tile URLs are IDENTICAL!');
            } else {
                console.log('Tile URLs are DIFFERENT - OK');
            }

            // Create container
            var container = document.createElement('div');
            container.id = 'map-container';

            var beforePanel = document.createElement('div');
            beforePanel.className = 'map-panel';
            beforePanel.innerHTML = `
                <div class="map-label">${config.before_label}</div>
                <div class="controls">
                    <label><input type="checkbox" id="show-before-s2"> Sentinel-2</label>
                    <br>
                    <label><input type="checkbox" id="toggle-lc"> Land Cover</label>
                    <hr style="margin:8px 0;border:none;border-top:1px solid #ddd;">
                    <label><input type="checkbox" id="toggle-mask"> Change Mask</label>
                </div>
                <div id="stats-panel" class="stats-panel"></div>
                <div id="map-before" class="leaflet-container"></div>
            `;

            var divider = document.createElement('div');
            divider.className = 'divider';

            var afterPanel = document.createElement('div');
            afterPanel.className = 'map-panel';
            afterPanel.innerHTML = `
                <div class="map-label">${config.after_label}</div>
                <div id="map-after" class="leaflet-container"></div>
            `;

            container.appendChild(beforePanel);
            container.appendChild(divider);
            container.appendChild(afterPanel);
            document.body.appendChild(container);

            var center = config.center || [18.52, 73.85];
            var aoiStyle = { color: '#ff6b00', weight: 4, fillOpacity: 0 };

            var esriUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';

            // Before map
            var mapBefore = L.map('map-before', {
                center: center,
                zoom: 14,
                zoomControl: true
            });
            L.tileLayer(esriUrl, { maxZoom: 18 }).addTo(mapBefore);

            // Sentinel-2 layer on base Esri (do NOT add by default - ESRI is crisper)
            var s2Layer1 = L.tileLayer(tile1url, { maxZoom: 21, minZoom: 0, opacity: 0.9 });
            // s2Layer1.addTo(mapBefore);  // Disabled: ESRI base is clearer
            console.log('Layer 1 created but not added (ESRI base is primary)');

            var maskLayer1 = null, maskLayer2 = null;
            if (config.change_mask_tiles) {
                console.log('Change mask URL:', config.change_mask_tiles);
                maskLayer1 = L.tileLayer(config.change_mask_tiles, { maxZoom: 21, minZoom: 0, opacity: 0.7 });
                maskLayer2 = L.tileLayer(config.change_mask_tiles, { maxZoom: 21, minZoom: 0, opacity: 0.7 });
            }

            var lcLayer1 = null, lcLayer2 = null;
            if (config.land_cover_before_tiles) {
                lcLayer1 = L.tileLayer(config.land_cover_before_tiles, { maxZoom: 21, minZoom: 0, opacity: 0.4 });
                lcLayer2 = L.tileLayer(config.land_cover_after_tiles, { maxZoom: 21, minZoom: 0, opacity: 0.4 });
            }

            // After map
            var mapAfter = L.map('map-after', {
                center: center,
                zoom: 14,
                zoomControl: true
            });
            L.tileLayer(esriUrl, { maxZoom: 18 }).addTo(mapAfter);

            var s2Layer2 = L.tileLayer(tile2url, { maxZoom: 21, minZoom: 0, opacity: 0.9 });
            // s2Layer2.addTo(mapAfter);  // Disabled: ESRI base is clearer
            console.log('Layer 2 created but not added (ESRI base is primary)');

            // Sync maps without infinite recursion
            var syncing = false;
            mapBefore.on('move', function() {
                if (!syncing && mapAfter) {
                    syncing = true;
                    mapAfter.setView(mapBefore.getCenter(), mapBefore.getZoom(), { animate: false });
                    syncing = false;
                }
            });

            mapAfter.on('move', function() {
                if (!syncing && mapBefore) {
                    syncing = true;
                    mapBefore.setView(mapAfter.getCenter(), mapAfter.getZoom(), { animate: false });
                    syncing = false;
                }
            });

            // AOI
            if (config.aoi) {
                var aoiLayer = L.geoJSON({
                    type: 'Feature',
                    geometry: config.aoi
                }, { style: aoiStyle }).addTo(mapBefore);

                L.geoJSON({
                    type: 'Feature',
                    geometry: config.aoi
                }, { style: aoiStyle }).addTo(mapAfter);

                mapBefore.fitBounds(aoiLayer.getBounds(), { padding: [50, 50] });
                mapAfter.fitBounds(aoiLayer.getBounds(), { padding: [50, 50] });
            }

            // Settlement markers
            function addSettlements(mapInstance, settlements) {
                if (!settlements || !settlements.length) return;
                settlements.forEach(function(s) {
                    L.circleMarker([s.lat, s.lon], {
                        radius: 4,
                        fillColor: '#ff9800',
                        color: '#fff',
                        weight: 1,
                        fillOpacity: 0.9
                    }).addTo(mapInstance)
                      .bindTooltip(s.name, {
                          permanent: true,
                          direction: 'top',
                          className: 'settlement-label',
                          offset: [0, -6]
                      });
                });
            }
            addSettlements(mapBefore, config.settlements);
            addSettlements(mapAfter, config.settlements);

            // Toggles
            var s2Toggle = document.getElementById('show-before-s2');
            if (s2Toggle) {
                s2Toggle.addEventListener('change', function(e) {
                    if (e.target.checked) {
                        s2Layer1.addTo(mapBefore);
                    } else {
                        mapBefore.removeLayer(s2Layer1);
                    }
                });
            }

            var maskToggle = document.getElementById('toggle-mask');
            if (maskToggle) {
                maskToggle.addEventListener('change', function(e) {
                    if (e.target.checked) {
                        if (maskLayer1) maskLayer1.addTo(mapBefore);
                        if (maskLayer2) maskLayer2.addTo(mapAfter);
                    } else {
                        if (maskLayer1) mapBefore.removeLayer(maskLayer1);
                        if (maskLayer2) mapAfter.removeLayer(maskLayer2);
                    }
                });
            }

            var lcToggle = document.getElementById('toggle-lc');
            if (lcToggle) {
                lcToggle.addEventListener('change', function(e) {
                    if (e.target.checked) {
                        if (lcLayer1) lcLayer1.addTo(mapBefore);
                        if (lcLayer2) lcLayer2.addTo(mapAfter);
                    } else {
                        if (lcLayer1) mapBefore.removeLayer(lcLayer1);
                        if (lcLayer2) mapAfter.removeLayer(lcLayer2);
                    }
                });
            }

            // Stats panel
            if (config.land_cover_stats && config.land_cover_stats.classes) {
                var statsPanel = document.getElementById('stats-panel');
                if (statsPanel) {
                    var html = '<div class="stats-header">Land Cover Change</div>';
                    config.land_cover_stats.classes.forEach(function(c) {
                        var arrow = c.delta > 0 ? '↑' : c.delta < 0 ? '↓' : '—';
                        var isNatural = (c.name === 'Water' || c.name === 'Forest' || c.name === 'Agriculture');
                        var deltaColor;
                        if (c.delta === 0) { deltaColor = '#666'; }
                        else if (isNatural) { deltaColor = c.delta > 0 ? '#2e7d32' : '#c62828'; }
                        else { deltaColor = c.delta > 0 ? '#c62828' : '#2e7d32'; }
                        var sign = c.delta > 0 ? '+' : '';
                        html += '<div class="stats-row">'
                            + '<span class="stats-swatch" style="background:#' + c.color + '"></span>'
                            + '<span class="stats-name">' + c.name + '</span>'
                            + '<span class="stats-pct">' + c.before + '%</span>'
                            + '<span class="stats-arrow">→</span>'
                            + '<span class="stats-pct">' + c.after + '%</span>'
                            + '<span class="stats-delta" style="color:' + deltaColor + '">' + sign + c.delta + '% ' + arrow + '</span>'
                            + '</div>';
                    });
                    statsPanel.innerHTML = html;
                }
            }
        }

        var configStr = localStorage.getItem('geovision_map_config');
        if (configStr) {
            localStorage.removeItem('geovision_map_config');
            try {
                var config = JSON.parse(configStr);
                showMap(config);
            } catch (e) {
                console.error('Parse error:', e);
            }
        }
    </script>
</body>
</html>
